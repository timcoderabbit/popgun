reviews:
  path_instructions:
    - path: "**/*"
      instructions: |
        - Do not comment on localization/i18n topics (wording, translation keys, locale parity, or localization QA) unless explicitly asked.
  path_filters:
  - "!.github/**"
  - "!.vscode/**"
  - "!colab/**"
  - "!data/**"
  - "!default/content/**"
  - "!default/scaffold/**"
  - "!docker/**"
  - "!**/locales/**"
  - "!node_modules/**"
  - "!plugins/**"
  - "!public/locales/**"
  - "!public/sounds/**"
  - "!public/css/bg_load.css"
  - "!public/scripts/extensions/third-party/**"
  - "!public/stats.json"
  - "!public/css/user.css"
  - "!public/error/**"
  - "!stmb-reference/**"
  - "!tests/**"
  - "!.coderabbit.yaml"
  - "!.dockerignore"
  - "!.editorconfig"
  - "!.gitignore"
  - "!AGENTS.md"
  - "!CHANGELOG-v2-vs-release.md"
  - "!config.yaml"
  - "!credits.md"
  - "!Dockerfile"
  - "!README.md"
  - "!start.bat"
  - "!start.sh"
  - "!STMB_PARITY_MATRIX.md"
  - "!STMB_PARITY_RUNNING.md"
  - "!*.md"
  - "!*.bat"
  - "!*.sh"
  - "!*.yaml"
  - "!*.yml"
  - "!*.json"
knowledge_base:
  code_guidelines:
    filePatterns:
    - "**/AGENTS.md"